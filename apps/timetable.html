<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notion King — Lịch 24 giờ</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.26.0/dist/tabler-icons.min.css"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap");
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #ffffff;
        --surface: #f8f8f8;
        --ink: #0a0a0a;
        --ink2: #444;
        --ink3: #999;
        --border: #ebebeb;
        --border2: #d0d0d0;
        --inp: #f3f3f3;
        --lc: rgba(0, 0, 0, 0.055);
        --play1: #ffd166;
        --play2: #f4a823;
        --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
        --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      body.dk {
        --bg: #0c0c0c;
        --surface: #161616;
        --ink: #f0efe8;
        --ink2: #aaa;
        --ink3: #555;
        --border: #252525;
        --border2: #353535;
        --inp: #1e1e1e;
        --lc: rgba(255, 255, 255, 0.045);
      }

      body {
        font-family: "Space Grotesk", sans-serif;
        background: var(--bg);
        min-height: 100vh;
        color: var(--ink);
        overflow-x: hidden;
        transition:
          background 0.3s,
          color 0.3s;
      }
      body::before {
        --sz: 48px;
        content: "";
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background:
          linear-gradient(90deg, var(--lc) 1px, transparent 1px var(--sz)) 0 0 /
            var(--sz) var(--sz),
          linear-gradient(0deg, var(--lc) 1px, transparent 1px var(--sz)) 0 0 /
            var(--sz) var(--sz);
      }

      /* ── NAV ── */
      .nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 400;
        height: 54px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 22px;
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
        transition:
          background 0.3s,
          border-color 0.3s;
      }
      body.dk .nav {
        background: rgba(12, 12, 12, 0.85);
      }
      .nav-brand {
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 3.5px;
        text-transform: uppercase;
        color: var(--ink);
        transition: color 0.3s;
      }
      .nav-right {
        display: flex;
        gap: 8px;
      }
      .nav-btn {
        width: 36px;
        height: 36px;
        display: grid;
        place-items: center;
        border: 1px solid var(--border);
        background: transparent;
        cursor: pointer;
        color: var(--ink);
        font-size: 17px;
        transition: all 0.2s var(--ease-out);
        position: relative;
        overflow: hidden;
      }
      .nav-btn::after {
        content: "";
        position: absolute;
        inset: 0;
        background: var(--ink);
        transform: scaleY(0);
        transform-origin: bottom;
        transition: transform 0.2s var(--ease-out);
      }
      .nav-btn:hover::after {
        transform: scaleY(1);
      }
      .nav-btn i {
        position: relative;
        z-index: 1;
        transition: color 0.2s;
      }
      .nav-btn:hover i {
        color: var(--bg);
      }

      /* ── PANEL ── */
      .panel-wrap {
        position: fixed;
        top: 54px;
        right: 0;
        z-index: 500;
        height: calc(100vh - 54px);
        pointer-events: none;
      }
      .panel {
        width: 304px;
        height: 100%;
        background: var(--surface);
        border-left: 1px solid var(--border);
        transform: translateX(100%);
        transition:
          transform 0.4s var(--ease-out),
          opacity 0.3s;
        pointer-events: all;
        display: flex;
        flex-direction: column;
        opacity: 0;
      }
      .panel.open {
        transform: translateX(0);
        opacity: 1;
      }
      .panel-head {
        padding: 20px 20px 14px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .panel-head h3 {
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 2.5px;
        text-transform: uppercase;
        color: var(--ink3);
      }
      .panel-body {
        flex: 1;
        overflow-y: auto;
        padding: 18px 20px 28px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        scrollbar-width: none;
      }
      .panel-body::-webkit-scrollbar {
        display: none;
      }
      .p-label {
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--ink3);
        margin-bottom: 9px;
        display: block;
      }
      .theme-row {
        display: flex;
        gap: 8px;
      }
      .theme-btn {
        flex: 1;
        padding: 8px;
        border: 1px solid var(--border2);
        background: transparent;
        color: var(--ink2);
        font-family: "Space Grotesk", sans-serif;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
      }
      .theme-btn i {
        font-size: 14px;
      }
      .theme-btn:hover,
      .theme-btn.on {
        background: var(--ink);
        color: var(--bg);
        border-color: var(--ink);
      }
      .div {
        height: 1px;
        background: var(--border);
      }
      .zlist {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .zi {
        border: 1px solid var(--border);
        background: var(--bg);
        padding: 10px 12px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        transition:
          border-color 0.2s,
          transform 0.2s var(--ease-out),
          box-shadow 0.2s;
      }
      .zi:hover {
        border-color: var(--border2);
        transform: translateX(-2px);
        box-shadow: 3px 0 0 0 var(--ink);
      }
      .zh {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .zdot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
        transition: transform 0.2s var(--ease-spring);
      }
      .zi:hover .zdot {
        transform: scale(1.4);
      }
      .zn {
        font-size: 11px;
        font-weight: 700;
        color: var(--ink);
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .zr {
        font-size: 10px;
        color: var(--ink3);
        flex-shrink: 0;
        font-weight: 700;
        letter-spacing: 0.5px;
      }
      .zdel {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--ink3);
        opacity: 0.35;
        padding: 2px;
        font-size: 15px;
        transition:
          opacity 0.2s,
          color 0.2s,
          transform 0.2s;
        display: flex;
        align-items: center;
      }
      .zdel:hover {
        opacity: 1;
        color: #e03030;
        transform: rotate(90deg);
      }
      .zfields {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .zfields input {
        font-family: "Space Grotesk", sans-serif;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        border: 1px solid var(--border);
        background: var(--inp);
        color: var(--ink);
        padding: 6px 9px;
        width: 100%;
        outline: none;
        letter-spacing: 0.5px;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .zfields input:focus {
        border-color: var(--ink);
        box-shadow: 0 0 0 2px rgba(10, 10, 10, 0.08);
      }
      body.dk .zfields input:focus {
        box-shadow: 0 0 0 2px rgba(240, 239, 232, 0.08);
      }
      .trow {
        display: flex;
        gap: 5px;
        align-items: center;
      }
      .trow select {
        font-family: "Space Grotesk", sans-serif;
        font-size: 11px;
        padding: 5px 6px;
        border: 1px solid var(--border);
        background: var(--inp);
        color: var(--ink);
        outline: none;
        cursor: pointer;
        flex: 1;
        transition: border-color 0.2s;
      }
      .trow select:focus {
        border-color: var(--ink);
      }
      .trow span {
        font-size: 10px;
        color: var(--ink3);
        font-weight: 700;
      }
      .add-btn {
        font-family: "Space Grotesk", sans-serif;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 2px;
        text-transform: uppercase;
        padding: 9px;
        border: 1px dashed var(--border2);
        background: transparent;
        color: var(--ink2);
        cursor: pointer;
        width: 100%;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }
      .add-btn i {
        font-size: 14px;
        transition: transform 0.2s var(--ease-spring);
      }
      .add-btn:hover {
        border-style: solid;
        border-color: var(--ink);
        color: var(--ink);
        background: var(--inp);
      }
      .add-btn:hover i {
        transform: rotate(90deg);
      }

      /* ── EMPTY ZONES NOTICE ── */
      .empty-notice {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--ink3);
        text-align: center;
        padding: 16px 0;
        opacity: 0.6;
        display: none;
      }
      .zlist:empty + .empty-notice {
        display: block;
      }

      /* ── MAIN ── */
      .main {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 82px 16px 60px;
        min-height: 100vh;
      }
      .title {
        text-align: center;
        margin-bottom: 32px;
        animation: fadeUp 0.6s var(--ease-out) both;
      }
      .title h1 {
        font-size: 36px;
        font-weight: 800;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--ink);
        line-height: 1;
      }
      .title p {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--ink3);
        margin-top: 8px;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* canvas wrapper với ripple — responsive */
      .cv-wrap {
        position: relative;
        animation: fadeUp 0.6s 0.1s var(--ease-out) both;
        width: min(520px, calc(100vw - 32px));
        aspect-ratio: 1;
      }
      #cv {
        display: block;
        width: 100%;
        height: 100%;
        cursor: pointer;
        transition: filter 0.3s;
      }
      .cv-wrap:hover #cv {
        filter: drop-shadow(0 8px 32px rgba(0, 0, 0, 0.12));
      }
      body.dk .cv-wrap:hover #cv {
        filter: drop-shadow(0 8px 32px rgba(240, 239, 232, 0.06));
      }

      /* ripple khi click PLAY */
      .ripple {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 84px;
        height: 84px;
        margin: -42px 0 0 -42px;
        border-radius: 50%;
        background: var(--play2);
        opacity: 0;
        transform: scale(0);
        pointer-events: none;
        z-index: 10;
      }
      .ripple.go {
        animation: rippleAnim 0.7s var(--ease-out) forwards;
      }
      @keyframes rippleAnim {
        0% {
          opacity: 0.5;
          transform: scale(0);
        }
        100% {
          opacity: 0;
          transform: scale(3);
        }
      }

      /* ── TOAST NOTIFICATION ── */
      .toast-wrap {
        position: fixed;
        bottom: 32px;
        right: 28px;
        z-index: 800;
        pointer-events: none;
        width: 300px;
        max-width: calc(100vw - 32px);
      }
      .toast {
        background: var(--surface);
        color: var(--ink);
        border: 1px solid var(--border2);
        display: flex;
        flex-direction: column;
        opacity: 0;
        pointer-events: none;
        transform: translateY(16px) scale(0.96);
        transition:
          opacity 0.35s var(--ease-out),
          transform 0.35s var(--ease-spring);
        font-family: "Space Grotesk", sans-serif;
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.12),
          0 2px 8px rgba(0, 0, 0, 0.08);
        overflow: hidden;
      }
      body.dk .toast {
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.5),
          0 2px 8px rgba(0, 0, 0, 0.3);
      }
      .toast.show {
        opacity: 1;
        pointer-events: all;
        transform: translateY(0) scale(1);
      }

      /* accent bar màu zone ở trên */
      .toast-accent {
        height: 3px;
        width: 100%;
        background: var(--zone-color, var(--ink));
        flex-shrink: 0;
      }

      .toast-inner {
        display: flex;
        align-items: stretch;
        flex: 1;
      }
      .toast-ico {
        width: 56px;
        display: grid;
        place-items: center;
        flex-shrink: 0;
        background: var(--inp);
      }
      .toast-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 12px 14px 10px;
      }
      .toast-label {
        font-size: 9px;
        font-weight: 600;
        letter-spacing: 2.5px;
        text-transform: uppercase;
        color: var(--ink3);
        margin-bottom: 4px;
      }
      .toast-hour {
        display: block;
        font-size: 32px;
        font-weight: 700;
        letter-spacing: 1px;
        line-height: 1;
        color: var(--ink);
      }
      .toast-task {
        display: block;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.5px;
        color: var(--ink2);
        margin-top: 3px;
      }
      .toast-bar {
        height: 2px;
        background: var(--border);
        flex-shrink: 0;
      }
      .toast-fill {
        height: 100%;
        background: var(--ink3);
        transform-origin: left;
        transform: scaleX(1);
      }
      .toast-fill.drain {
        transform: scaleX(0);
        transition: transform 5s linear;
      }
      .toast-close {
        width: 36px;
        display: grid;
        place-items: center;
        border: none;
        border-left: 1px solid var(--border);
        background: none;
        color: var(--ink3);
        font-size: 14px;
        cursor: pointer;
        transition:
          opacity 0.2s,
          background 0.2s,
          color 0.2s;
        flex-shrink: 0;
      }
      .toast-close:hover {
        color: var(--ink);
        background: var(--inp);
      }

      /* ── SPIN INDICATOR ── */
      .spin-hint {
        position: absolute;
        bottom: -36px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--ink3);
        opacity: 0;
        transition: opacity 0.3s;
        white-space: nowrap;
        pointer-events: none;
      }
      .cv-wrap:hover .spin-hint {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div class="nav">
      <span class="nav-brand">Notion King</span>
      <div class="nav-right">
        <button
          class="nav-btn"
          id="settBtn"
          title="Cài đặt"
          aria-label="Cài đặt"
        >
          <i class="ti ti-adjustments-horizontal"></i>
        </button>
      </div>
    </div>

    <div class="panel-wrap">
      <div class="panel" id="panel">
        <div class="panel-head">
          <h3>Cài đặt</h3>
        </div>
        <div class="panel-body">
          <div>
            <span class="p-label">Giao diện</span>
            <div class="theme-row">
              <button class="theme-btn on" id="tL" onclick="setTheme('light')">
                <i class="ti ti-sun"></i>Sáng
              </button>
              <button class="theme-btn" id="tD" onclick="setTheme('dark')">
                <i class="ti ti-moon"></i>Tối
              </button>
            </div>
          </div>
          <div class="div"></div>
          <div>
            <span class="p-label">Vùng hoạt động</span>
            <div class="zlist" id="zlist"></div>
            <div class="empty-notice">Chưa có vùng nào — thêm bên dưới</div>
            <button class="add-btn" id="addBtn">
              <i class="ti ti-plus"></i>Thêm vùng
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="toast-wrap">
      <div class="toast" id="toast">
        <div class="toast-accent" id="tAccent"></div>
        <div class="toast-inner">
          <div class="toast-ico">
            <canvas id="tIco" width="44" height="44"></canvas>
          </div>
          <div class="toast-content">
            <span class="toast-label">Giờ được chọn</span>
            <span class="toast-hour" id="tHr">—</span>
            <span class="toast-task" id="tTsk">—</span>
          </div>
          <button
            class="toast-close"
            onclick="hideToast()"
            aria-label="Close"
            title="Close"
          >
            <i class="ti ti-x"></i>
          </button>
        </div>
        <div class="toast-bar"><div class="toast-fill" id="tFill"></div></div>
      </div>
    </div>

    <div class="main">
      <div class="title">
        <h1>Lịch 24 giờ</h1>
        <p>Today's time table</p>
      </div>
      <div class="cv-wrap">
        <div class="ripple" id="ripple"></div>
        <canvas
          id="cv"
          width="520"
          height="520"
          aria-label="Đồng hồ 24 giờ"
        ></canvas>
        <div class="spin-hint">Bấm PLAY để quay</div>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const W = 520,
          CX = 260,
          CY = 260,
          R = 213,
          RN = 241;
        const ZCOLS = [
          "#7c3aed",
          "#e8420a",
          "#2563eb",
          "#16a34a",
          "#d97706",
          "#0891b2",
          "#be123c",
          "#059669",
          "#ca8a04",
          "#9333ea",
        ];

        /* ── ICON ENGINE ── */
        function drawIcon(c, name, cx, cy, s, col) {
          const n = (name || "").toLowerCase(),
            r = s * 0.4,
            lw = Math.max(1.4, s * 0.092);
          c.save();
          c.strokeStyle = col;
          c.fillStyle = col;
          c.lineWidth = lw;
          c.lineCap = "round";
          c.lineJoin = "round";
          c.globalAlpha = 1;
          if (n.includes("mộng") || n.includes("ngủ")) {
            c.beginPath();
            c.arc(cx, cy, r, 0.22 * Math.PI, 1.78 * Math.PI);
            c.arc(
              cx - r * 0.32,
              cy,
              r * 0.8,
              1.78 * Math.PI,
              0.22 * Math.PI,
              true,
            );
            c.closePath();
            c.fill();
            [
              [cx + r * 0.7, cy - r * 0.5],
              [cx + r * 0.5, cy - r * 0.8],
              [cx + r * 0.85, cy - r * 0.2],
            ].forEach(([sx, sy]) => {
              c.beginPath();
              c.arc(sx, sy, lw * 0.7, 0, 2 * Math.PI);
              c.fill();
            });
          } else if (n.includes("sáng")) {
            c.beginPath();
            c.arc(cx, cy, r * 0.36, 0, 2 * Math.PI);
            c.fill();
            for (let i = 0; i < 8; i++) {
              const a = (i / 8) * 2 * Math.PI;
              c.beginPath();
              c.moveTo(
                cx + Math.cos(a) * r * 0.54,
                cy + Math.sin(a) * r * 0.54,
              );
              c.lineTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
              c.stroke();
            }
          } else if (n.includes("game")) {
            c.beginPath();
            if (c.roundRect)
              c.roundRect(cx - r, cy - r * 0.47, r * 2, r * 0.94, r * 0.22);
            else c.rect(cx - r, cy - r * 0.47, r * 2, r * 0.94);
            c.stroke();
            c.fillRect(cx - r * 0.6, cy - r * 0.06, r * 0.13, r * 0.44);
            c.fillRect(cx - r * 0.67, cy + r * 0.07, r * 0.46, r * 0.13);
            c.beginPath();
            c.arc(cx + r * 0.38, cy - r * 0.08, r * 0.13, 0, 2 * Math.PI);
            c.fill();
            c.beginPath();
            c.arc(cx + r * 0.62, cy + r * 0.12, r * 0.13, 0, 2 * Math.PI);
            c.fill();
          } else if (n.includes("manga") || n.includes("đọc")) {
            c.beginPath();
            c.moveTo(cx, cy - r);
            c.lineTo(cx - r, cy - r * 0.68);
            c.lineTo(cx - r, cy + r);
            c.lineTo(cx, cy + r * 0.78);
            c.closePath();
            c.stroke();
            c.beginPath();
            c.moveTo(cx, cy - r);
            c.lineTo(cx + r, cy - r * 0.68);
            c.lineTo(cx + r, cy + r);
            c.lineTo(cx, cy + r * 0.78);
            c.closePath();
            c.stroke();
            c.beginPath();
            c.moveTo(cx, cy - r);
            c.lineTo(cx, cy + r * 0.78);
            c.stroke();
          } else if (n.includes("trưa")) {
            c.beginPath();
            c.arc(cx, cy - r * 0.42, r * 0.28, 0, 2 * Math.PI);
            c.stroke();
            c.beginPath();
            c.moveTo(cx, cy - r * 0.14);
            c.quadraticCurveTo(
              cx + r * 0.15,
              cy + r * 0.3,
              cx - r * 0.2,
              cy + r * 0.55,
            );
            c.stroke();
            c.beginPath();
            c.moveTo(cx, cy - r * 0.14);
            c.quadraticCurveTo(
              cx - r * 0.1,
              cy + r * 0.1,
              cx + r * 0.3,
              cy + r * 0.5,
            );
            c.stroke();
            c.font = `bold ${s * 0.24}px sans-serif`;
            c.textBaseline = "alphabetic";
            c.textAlign = "left";
            c.fillText("z z z", cx - r * 0.05, cy - r * 0.58);
          } else if (n.includes("workshop")) {
            // FIX: thay hAng2 placeholder bằng logic thực — vẽ tia sáng quanh bóng đèn
            c.beginPath();
            c.arc(cx, cy - r * 0.12, r * 0.46, 1.1 * Math.PI, 1.9 * Math.PI);
            c.lineTo(cx + r * 0.28, cy + r * 0.5);
            c.lineTo(cx - r * 0.28, cy + r * 0.5);
            c.closePath();
            c.stroke();
            c.beginPath();
            c.moveTo(cx - r * 0.22, cy + r * 0.6);
            c.lineTo(cx + r * 0.22, cy + r * 0.6);
            c.stroke();
            c.beginPath();
            c.moveTo(cx - r * 0.16, cy + r * 0.73);
            c.lineTo(cx + r * 0.16, cy + r * 0.73);
            c.stroke();
            const lw2 = lw * 0.65;
            c.lineWidth = lw2;
            const rays = [
              [-0.6, -0.5],
              [-0.3, -0.6],
              [0, -0.62],
              [0.3, -0.6],
              [0.6, -0.5],
            ];
            rays.forEach(([dx, dy]) => {
              const len = Math.sqrt(dx * dx + dy * dy);
              const nx = dx / len,
                ny = dy / len;
              c.beginPath();
              c.moveTo(cx + nx * r * 0.52, cy - r * 0.12 + ny * r * 0.52);
              c.lineTo(cx + nx * r * 0.72, cy - r * 0.12 + ny * r * 0.72);
              c.stroke();
            });
          } else if (n.includes("tự do")) {
            c.beginPath();
            c.moveTo(cx - r, cy + r * 0.1);
            c.quadraticCurveTo(cx - r * 0.5, cy - r * 0.62, cx, cy + r * 0.1);
            c.stroke();
            c.beginPath();
            c.moveTo(cx, cy + r * 0.1);
            c.quadraticCurveTo(
              cx + r * 0.5,
              cy - r * 0.62,
              cx + r,
              cy + r * 0.1,
            );
            c.stroke();
            c.beginPath();
            c.arc(cx, cy + r * 0.1, r * 0.09, 0, 2 * Math.PI);
            c.fill();
          } else {
            c.beginPath();
            c.moveTo(cx, cy - r);
            c.lineTo(cx + r * 0.55, cy);
            c.lineTo(cx, cy + r);
            c.lineTo(cx - r * 0.55, cy);
            c.closePath();
            c.stroke();
            c.beginPath();
            c.arc(cx, cy, r * 0.18, 0, 2 * Math.PI);
            c.fill();
          }
          c.restore();
        }

        let zones = [
          { id: 1, name: "xứ sở mộng mơ", from: 0, to: 6, color: "#7c3aed" },
          { id: 2, name: "buổi sáng", from: 6, to: 9, color: "#d97706" },
          { id: 3, name: "chơi game", from: 9, to: 12, color: "#2563eb" },
          { id: 4, name: "ngủ trưa", from: 12, to: 14, color: "#9333ea" },
          { id: 5, name: "đọc manga", from: 14, to: 17, color: "#16a34a" },
          { id: 6, name: "chơi game", from: 17, to: 19, color: "#2563eb" },
          { id: 7, name: "workshop", from: 19, to: 22, color: "#be123c" },
          { id: 8, name: "tự do", from: 22, to: 24, color: "#0891b2" },
        ];
        let nid = 9,
          dk = false,
          spinning = false,
          spinDeg = 0,
          spinHand = "hr",
          nTimer = null;

        const cv = document.getElementById("cv");
        const ctx = cv.getContext("2d");
        const r2d = (d) => (d * Math.PI) / 180;
        const hAng = (h) => r2d((h / 24) * 360 - 90);
        const ppx = (r, a) => CX + r * Math.cos(a);
        const ppy = (r, a) => CY + r * Math.sin(a);

        function getT() {
          const n = new Date(),
            ms = n.getMilliseconds();
          const s = n.getSeconds() + ms / 1000,
            m = n.getMinutes() + s / 60,
            h = n.getHours() + m / 60;
          return { hr: (h / 24) * 360, mn: (m / 60) * 360, sc: (s / 60) * 360 };
        }

        /* ── HOVER ZONE DETECT ── */
        let hoveredZone = null;
        cv.addEventListener("mousemove", (e) => {
          if (spinning) return;
          const rc = cv.getBoundingClientRect();
          const mx = ((e.clientX - rc.left) * W) / rc.width - CX;
          const my = ((e.clientY - rc.top) * W) / rc.height - CY;
          const dist = Math.sqrt(mx * mx + my * my);
          if (dist > R || dist < 44) {
            hoveredZone = null;
            cv.style.cursor = dist <= 44 ? "pointer" : "default";
            return;
          }
          cv.style.cursor = "default";
          let angle = ((Math.atan2(my, mx) * 180) / Math.PI + 90 + 360) % 360;
          const h = (angle / 360) * 24;
          hoveredZone = zones.find((z) => h >= z.from && h < z.to) || null;
        });
        cv.addEventListener("mouseleave", () => {
          hoveredZone = null;
        });

        function drawZoneLabel(z, textCol, isHovered) {
          if (!z.name) return;
          const span = z.to - z.from;
          if (span <= 0) return;
          const midH = (z.from + z.to) / 2;
          const aMid = hAng(midH);

          const rBlock = R * 0.63;
          const bx = CX + rBlock * Math.cos(aMid);
          const by = CY + rBlock * Math.sin(aMid);

          const label = z.name.toUpperCase();
          const words = label.split(" ");

          // ── Tính không gian ngang & dọc thực tế tại vị trí label ──
          // Góc sector (radian)
          const arcAngle = (span / 24) * 2 * Math.PI;
          // Dây cung tại rBlock
          const chord =
            2 * rBlock * Math.sin(Math.min(arcAngle / 2, Math.PI / 2));

          // aMid tính từ trục ngang canvas (0=phải, tăng CW)
          // → hướng "ngang" của sector là chiều vuông góc với bán kính
          // → hướng "dọc" của sector là dọc theo bán kính
          // Chiều rộng ngang khả dụng = projection của chord lên trục X màn hình
          // Chiều cao dọc khả dụng   = projection của chord lên trục Y + độ sâu theo bán kính

          // Đơn giản hóa: dùng sin/cos của aMid để biết sector "nghiêng" bao nhiêu
          const cosA = Math.abs(Math.cos(aMid)); // 1 = sector nằm ngang (3h/9h), 0 = sector nằm dọc (12h/6h)
          const sinA = Math.abs(Math.sin(aMid)); // 1 = sector nằm dọc

          // Chiều rộng ngang thực tế tại label
          const availW = chord * (sinA * 0.75 + cosA * 1.1); // nằm ngang → rộng hơn
          // Chiều cao dọc thực tế tại label
          const availH = chord * (cosA * 0.75 + sinA * 1.1); // nằm dọc → cao hơn

          const maxW = availW * 0.82;

          let fs = Math.max(11, Math.min(16, 9 + span * 0.85));
          ctx.font = `700 ${fs}px 'Space Grotesk',sans-serif`;

          // bestSplit: chia 2 dòng cân bằng nhất
          function bestSplit(f) {
            ctx.font = `700 ${f}px 'Space Grotesk',sans-serif`;
            if (words.length < 2) return null;
            let best = null,
              bestDiff = Infinity;
            for (let i = 1; i < words.length; i++) {
              const l1 = words.slice(0, i).join(" "),
                l2 = words.slice(i).join(" ");
              const diff = Math.abs(
                ctx.measureText(l1).width - ctx.measureText(l2).width,
              );
              if (diff < bestDiff) {
                bestDiff = diff;
                best = [l1, l2];
              }
            }
            return best;
          }

          const lh = fs * 1.38;
          const icoH = span >= 2 ? fs * 1.2 + fs * 0.3 : 0;
          // Sector nằm ngang (cosA lớn) thì không cho 2 dòng dù có nhiều chữ
          // Ngưỡng: cosA > 0.6 = sector nghiêng < 53° so với ngang → 1 dòng
          const isHorizontal = cosA > 0.6;
          const canTwoLines =
            !isHorizontal && words.length >= 2 && availH >= icoH + lh * 2 + 4;

          let lines;
          const fullW = ctx.measureText(label).width;

          if (!canTwoLines || words.length === 1) {
            // 1 dòng
            if (fullW > maxW) {
              fs = Math.max(9, (fs * maxW) / fullW);
              ctx.font = `700 ${fs}px 'Space Grotesk',sans-serif`;
            }
            lines = [label];
          } else {
            // 2 dòng
            const split = bestSplit(fs);
            const maxSplitW = Math.max(
              ctx.measureText(split[0]).width,
              ctx.measureText(split[1]).width,
            );
            if (maxSplitW > maxW) {
              // scale font
              fs = Math.max(8, (fs * maxW) / maxSplitW);
              ctx.font = `700 ${fs}px 'Space Grotesk',sans-serif`;
            }
            lines = split;
          }

          const icoS = Math.max(11, Math.min(18, fs * 1.2));
          const gap = fs * 0.3;
          const showIco = span >= 2;
          const usedLh = fs * 1.38;
          const totalH = (showIco ? icoS + gap : 0) + lines.length * usedLh;

          ctx.save();
          ctx.globalAlpha = isHovered ? 1 : hoveredZone ? 0.35 : 0.9;

          let y = by - totalH / 2;
          if (showIco) {
            drawIcon(ctx, z.name, bx, y + icoS / 2, icoS, textCol);
            y += icoS + gap;
          }

          ctx.fillStyle = textCol;
          ctx.font = `700 ${fs}px 'Space Grotesk',sans-serif`;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          lines.forEach((line, i) =>
            ctx.fillText(line, bx, y + usedLh / 2 + i * usedLh),
          );

          ctx.restore();
        }

        function draw() {
          ctx.clearRect(0, 0, W, W);
          const ink = dk ? "#f0efe8" : "#0a0a0a";
          const face = dk ? "#161616" : "#ffffff";

          ctx.save();
          ctx.shadowColor = dk ? "rgba(0,0,0,.5)" : "rgba(0,0,0,.12)";
          ctx.shadowBlur = 32;
          ctx.shadowOffsetY = 8;
          ctx.beginPath();
          ctx.arc(CX, CY, R + 3, 0, 2 * Math.PI);
          ctx.fillStyle = face;
          ctx.fill();
          ctx.restore();

          ctx.beginPath();
          ctx.arc(CX, CY, R + 3, 0, 2 * Math.PI);
          ctx.strokeStyle = ink;
          ctx.lineWidth = 2;
          ctx.stroke();

          // sector fills
          zones.forEach((z) => {
            const isH = hoveredZone && hoveredZone.id === z.id;
            ctx.beginPath();
            ctx.moveTo(CX, CY);
            ctx.arc(CX, CY, R, hAng(z.from), hAng(z.to));
            ctx.closePath();
            ctx.fillStyle = isH
              ? dk
                ? "rgba(255,255,255,.06)"
                : "rgba(0,0,0,.04)"
              : dk
                ? "rgba(255,255,255,.02)"
                : "rgba(0,0,0,.012)";
            ctx.fill();
            if (isH) {
              ctx.strokeStyle = dk
                ? "rgba(240,239,232,.15)"
                : "rgba(0,0,0,.12)";
              ctx.lineWidth = 1;
              ctx.stroke();
            }
          });

          // spokes
          const bnd = new Set();
          zones.forEach((z) => {
            bnd.add(z.from);
            bnd.add(z.to);
          });
          bnd.forEach((h) => {
            const a = hAng(h);
            ctx.beginPath();
            ctx.moveTo(CX, CY);
            ctx.lineTo(ppx(R, a), ppy(R, a));
            ctx.strokeStyle = dk ? "rgba(240,239,232,.12)" : "rgba(0,0,0,.08)";
            ctx.lineWidth = 1;
            ctx.stroke();
          });

          // zone labels
          zones.forEach((z) => {
            const isH = hoveredZone && hoveredZone.id === z.id;
            drawZoneLabel(z, ink, isH);
          });

          // ticks + numbers
          for (let h = 1; h <= 24; h++) {
            const a = hAng(h),
              mj = h % 6 === 0;
            ctx.beginPath();
            ctx.moveTo(ppx(R + 3, a), ppy(R + 3, a));
            ctx.lineTo(
              ppx(R + 3 - (mj ? 20 : 8), a),
              ppy(R + 3 - (mj ? 20 : 8), a),
            );
            ctx.strokeStyle = ink;
            ctx.lineWidth = mj ? 2.5 : 1.2;
            ctx.globalAlpha = mj ? 1 : 0.55;
            ctx.stroke();
            ctx.globalAlpha = 1;
            ctx.fillStyle = ink;
            ctx.font = `600 ${mj ? 14 : 11.5}px 'Space Grotesk',sans-serif`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(h, ppx(RN, a), ppy(RN, a));
          }

          // ── HANDS + MINIONS ──
          const t = getT();
          const hrD = spinning && spinHand === "hr" ? spinDeg : t.hr;
          const mnD = spinning && spinHand === "mn" ? spinDeg : t.mn;
          const scD = spinning && spinHand === "sc" ? spinDeg : t.sc;

          function hand(deg, len, tail, w, col) {
            const a = r2d(deg - 90);
            ctx.save();
            ctx.shadowColor = dk ? "rgba(0,0,0,.35)" : "rgba(0,0,0,.12)";
            ctx.shadowBlur = 4;
            ctx.beginPath();
            ctx.moveTo(CX - tail * Math.cos(a), CY - tail * Math.sin(a));
            ctx.lineTo(CX + len * Math.cos(a), CY + len * Math.sin(a));
            ctx.strokeStyle = col;
            ctx.lineWidth = w;
            ctx.lineCap = "round";
            ctx.stroke();
            ctx.restore();
          }

          // Minion — luôn đứng thẳng, không xoay theo kim
          function drawMinion(deg, dist, v) {
            const a = r2d(deg - 90);
            const x = CX + dist * Math.cos(a),
              y = CY + dist * Math.sin(a);
            const s = 13;
            ctx.save();
            ctx.translate(x, y);
            // body
            const bodyCol =
              v === 0 ? "#f4c542" : v === 1 ? "#f4c542" : "#f4c542";
            ctx.fillStyle = bodyCol;
            ctx.beginPath();
            ctx.ellipse(0, 1, s * 0.62, s * 0.9, 0, 0, 2 * Math.PI);
            ctx.fill();
            // overalls
            const ovCol = v === 0 ? "#2563eb" : v === 1 ? "#7c3aed" : "#16a34a";
            ctx.fillStyle = ovCol;
            ctx.beginPath();
            ctx.ellipse(0, s * 0.6, s * 0.62, s * 0.42, 0, 0, Math.PI);
            ctx.fill();
            // suspenders
            ctx.strokeStyle = ovCol;
            ctx.lineWidth = s * 0.11;
            ctx.lineCap = "round";
            ctx.beginPath();
            ctx.moveTo(-s * 0.2, -s * 0.05);
            ctx.lineTo(-s * 0.05, -s * 0.42);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(s * 0.2, -s * 0.05);
            ctx.lineTo(s * 0.05, -s * 0.42);
            ctx.stroke();
            // goggles band
            ctx.strokeStyle = "#888";
            ctx.lineWidth = s * 0.08;
            if (v === 1) {
              // 1 mắt (Kevin)
              ctx.beginPath();
              ctx.moveTo(-s * 0.32, -s * 0.2);
              ctx.lineTo(s * 0.32, -s * 0.2);
              ctx.stroke();
              ctx.fillStyle = "#666";
              ctx.beginPath();
              ctx.arc(0, -s * 0.19, s * 0.28, 0, 2 * Math.PI);
              ctx.fill();
              ctx.fillStyle = "white";
              ctx.beginPath();
              ctx.arc(0, -s * 0.19, s * 0.2, 0, 2 * Math.PI);
              ctx.fill();
              ctx.fillStyle = "#1a1a3e";
              ctx.beginPath();
              ctx.arc(0, -s * 0.19, s * 0.12, 0, 2 * Math.PI);
              ctx.fill();
              ctx.fillStyle = "white";
              ctx.beginPath();
              ctx.arc(s * 0.06, -s * 0.25, s * 0.055, 0, 2 * Math.PI);
              ctx.fill();
            } else {
              // 2 mắt (Stuart/Bob)
              ctx.beginPath();
              ctx.moveTo(-s * 0.55, -s * 0.2);
              ctx.lineTo(s * 0.55, -s * 0.2);
              ctx.stroke();
              for (const ox of [-s * 0.27, s * 0.27]) {
                ctx.fillStyle = "#666";
                ctx.beginPath();
                ctx.arc(ox, -s * 0.19, s * 0.23, 0, 2 * Math.PI);
                ctx.fill();
                ctx.fillStyle = "white";
                ctx.beginPath();
                ctx.arc(ox, -s * 0.19, s * 0.16, 0, 2 * Math.PI);
                ctx.fill();
                ctx.fillStyle = "#1a1a3e";
                ctx.beginPath();
                ctx.arc(ox, -s * 0.19, s * 0.09, 0, 2 * Math.PI);
                ctx.fill();
                ctx.fillStyle = "white";
                ctx.beginPath();
                ctx.arc(ox + s * 0.04, -s * 0.23, s * 0.04, 0, 2 * Math.PI);
                ctx.fill();
              }
            }
            // smile
            ctx.strokeStyle = "#5a3a00";
            ctx.lineWidth = s * 0.09;
            ctx.lineCap = "round";
            ctx.beginPath();
            ctx.arc(0, s * 0.2, s * 0.19, 0.1 * Math.PI, 0.9 * Math.PI);
            ctx.stroke();
            // hair
            ctx.fillStyle = "#3a2800";
            if (v === 0) {
              // Stuart — bang
              for (let i = -1; i <= 1; i++) {
                {
                  ctx.beginPath();
                  ctx.ellipse(
                    i * s * 0.22,
                    -s * 0.83,
                    s * 0.09,
                    s * 0.14,
                    i * 0.2,
                    0,
                    2 * Math.PI,
                  );
                  ctx.fill();
                }
              }
            } else if (v === 1) {
              // Kevin — tall hair
              ctx.beginPath();
              ctx.ellipse(0, -s * 0.95, s * 0.1, s * 0.2, 0, 0, 2 * Math.PI);
              ctx.fill();
            } else {
              // Bob — tiny tufts
              ctx.beginPath();
              ctx.ellipse(
                -s * 0.12,
                -s * 0.82,
                s * 0.08,
                s * 0.12,
                0.3,
                0,
                2 * Math.PI,
              );
              ctx.fill();
              ctx.beginPath();
              ctx.ellipse(
                s * 0.12,
                -s * 0.82,
                s * 0.08,
                s * 0.12,
                -0.3,
                0,
                2 * Math.PI,
              );
              ctx.fill();
            }
            ctx.restore();
          }

          // vẽ kim + minion theo thứ tự z (giây→phút→giờ = dưới→trên)
          hand(scD, 150, 26, 1.3, "#e8420a");
          drawMinion(scD, 150, 2); // Bob
          hand(
            mnD,
            132,
            18,
            2.0,
            dk ? "rgba(240,239,232,.32)" : "rgba(0,0,0,.18)",
          );
          drawMinion(mnD, 132, 0); // Stuart
          hand(hrD, 106, 22, 5, ink);
          drawMinion(hrD, 106, 1); // Kevin

          ctx.beginPath();
          ctx.arc(CX, CY, 4, 0, 2 * Math.PI);
          ctx.fillStyle = "#e8420a";
          ctx.fill();
          ctx.beginPath();
          ctx.arc(CX, CY, 10, 0, 2 * Math.PI);
          ctx.fillStyle = ink;
          ctx.fill();
          ctx.beginPath();
          ctx.arc(CX, CY, 4, 0, 2 * Math.PI);
          ctx.fillStyle = face;
          ctx.fill();

          // ── NÚT PLAY / ĐỒNG HỒ CÁT ──
          ctx.save();
          const gr = ctx.createRadialGradient(CX, CY - 5, 1, CX, CY, 42);
          gr.addColorStop(0, "#ffe470");
          gr.addColorStop(1, "#f4a823");
          ctx.shadowColor = "rgba(244,168,35,.45)";
          ctx.shadowBlur = spinning ? 28 : 10;
          ctx.beginPath();
          ctx.arc(CX, CY, 42, 0, 2 * Math.PI);
          ctx.fillStyle = gr;
          ctx.fill();
          ctx.restore();
          ctx.strokeStyle = dk ? "rgba(240,239,232,.5)" : "rgba(0,0,0,.55)";
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.arc(CX, CY, 42, 0, 2 * Math.PI);
          ctx.stroke();

          if (spinning) {
            // ── ĐỒNG HỒ CÁT ĐẸP ──
            const now = performance.now();
            const phase = (now / 900) % 1;
            const hw = 12,
              hh = 15;
            const sandCol = "rgba(110,65,10,.9)";

            ctx.save();
            ctx.translate(CX, CY);
            // clip trong nút tròn
            ctx.beginPath();
            ctx.arc(0, 0, 39, 0, 2 * Math.PI);
            ctx.clip();

            // Cát trên — tam giác đổ cạn dần
            const tf = 1 - phase;
            if (tf > 0.005) {
              ctx.fillStyle = sandCol;
              ctx.beginPath();
              // mặt cát nằm ngang tại y = -hh + hh*(1-tf)*2... cần nằm trong tam giác trên
              // Tam giác trên: đỉnh (-hw,-hh),(hw,-hh),(0,0)
              // Cạnh bên tại y: x = ±hw*(0-y)/(hh) = ±hw*(-y/hh)
              const surfY = -hh * tf; // mặt cát tại y này
              const ex = hw * (-surfY / hh);
              ctx.moveTo(-hw, -hh);
              ctx.lineTo(hw, -hh);
              ctx.lineTo(ex, surfY);
              ctx.lineTo(-ex, surfY);
              ctx.closePath();
              ctx.fill();
            }

            // Cát dưới — tam giác tích dần
            const bf = phase;
            if (bf > 0.005) {
              ctx.fillStyle = sandCol;
              ctx.beginPath();
              // Tam giác dưới: đỉnh (0,0),(hw,hh),(-hw,hh)
              // Cạnh bên tại y: x = ±hw*(y/hh)
              const surfY2 = hh * (1 - bf);
              const ex2 = hw * (surfY2 / hh);
              ctx.moveTo(-ex2, surfY2);
              ctx.lineTo(ex2, surfY2);
              ctx.lineTo(hw, hh);
              ctx.lineTo(-hw, hh);
              ctx.closePath();
              ctx.fill();
            }

            // Dòng cát chảy eo
            ctx.save();
            ctx.strokeStyle = sandCol;
            ctx.lineWidth = 1.8;
            ctx.lineCap = "round";
            ctx.beginPath();
            ctx.moveTo(0, -2);
            ctx.lineTo(0, hh * 0.55);
            ctx.stroke();
            // 4 hạt rơi
            for (let i = 0; i < 4; i++) {
              const dp = (phase + i * 0.25) % 1;
              const px = i % 2 === 0 ? 1.2 : -1.2;
              const py = -1 + dp * (hh * 0.5);
              ctx.globalAlpha = Math.max(0, 0.85 - dp * 0.7);
              ctx.fillStyle = sandCol;
              ctx.beginPath();
              ctx.arc(px, py, 1.1, 0, 2 * Math.PI);
              ctx.fill();
            }
            ctx.globalAlpha = 1;
            ctx.restore();

            // Khung đồng hồ cát (vẽ sau để đè lên cát)
            ctx.strokeStyle = "rgba(0,0,0,.75)";
            ctx.lineWidth = 1.8;
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
            ctx.beginPath();
            ctx.moveTo(-hw, -hh);
            ctx.lineTo(hw, -hh);
            ctx.lineTo(0, 0);
            ctx.lineTo(hw, hh);
            ctx.lineTo(-hw, hh);
            ctx.lineTo(0, 0);
            ctx.closePath();
            ctx.stroke();
            // thanh ngang
            ctx.lineWidth = 2.5;
            ctx.lineCap = "round";
            ctx.beginPath();
            ctx.moveTo(-hw - 2.5, -hh);
            ctx.lineTo(hw + 2.5, -hh);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(-hw - 2.5, hh);
            ctx.lineTo(hw + 2.5, hh);
            ctx.stroke();

            ctx.restore();
          } else {
            ctx.fillStyle = "rgba(0,0,0,.75)";
            ctx.font = `700 12px 'Space Grotesk',sans-serif`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("PLAY", CX, CY);
          }

          ctx.beginPath();
          ctx.arc(CX, CY, R + 3, 0, 2 * Math.PI);
          ctx.strokeStyle = ink;
          ctx.lineWidth = 2;
          ctx.stroke();
        }

        /* ripple effect */
        function triggerRipple() {
          const r = document.getElementById("ripple");
          r.classList.remove("go");
          void r.offsetWidth;
          r.classList.add("go");
        }

        cv.addEventListener("click", (e) => {
          if (spinning) return;
          const rc = cv.getBoundingClientRect();
          const mx = ((e.clientX - rc.left) * W) / rc.width - CX;
          const my = ((e.clientY - rc.top) * W) / rc.height - CY;
          if (Math.sqrt(mx * mx + my * my) <= 44) {
            triggerRipple();
            startSpin();
          }
        });

        function loop() {
          draw();
          requestAnimationFrame(loop);
        }

        /* FIX: dùng githubusercontent thay vì github.com/raw để tránh bị chặn */
        const sS = new Audio(
          "https://raw.githubusercontent.com/tranbinh02/STORAGE_BOX/main/spin.mp3",
        );
        const cS = new Audio(
          "https://raw.githubusercontent.com/tranbinh02/STORAGE_BOX/main/clap.mp3",
        );
        sS.preload = "auto";
        cS.preload = "auto";

        function startSpin() {
          if (spinning) return;
          spinning = true;
          hideToast();
          // Chọn kim ngẫu nhiên
          const hands = ["hr", "mn", "sc"];
          spinHand = hands[Math.floor(Math.random() * 3)];
          const t0val = getT();
          const startDeg =
            spinHand === "hr"
              ? t0val.hr
              : spinHand === "mn"
                ? t0val.mn
                : t0val.sc;
          spinDeg = startDeg;
          const total = (10 + Math.random() * 8) * 360,
            dur = 7000,
            t0 = performance.now();
          try {
            sS.currentTime = 0;
            sS.play();
          } catch (_) {}
          function frame(ts) {
            const p = Math.min((ts - t0) / dur, 1);
            spinDeg = startDeg + (1 - Math.pow(1 - p, 4)) * total;
            if (p < 1) {
              requestAnimationFrame(frame);
              return;
            }
            // Spin xong — dừng đồng hồ cát ngay
            spinning = false;
            const fh =
              Math.round((((spinDeg % 360) + 360) % 360) / 15) % 24 || 24;
            const zone = zones.find((z) => fh > z.from && fh <= z.to) || null;
            try {
              sS.pause();
              cS.currentTime = 0;
              cS.play();
            } catch (_) {}
            showToast(fh, zone);
            // Kim trở về giờ thực (không spinning nên dùng getT() tự nhiên)
          }
          requestAnimationFrame(frame);
        }

        function showToast(h, zone) {
          const nc = document.getElementById("tIco"),
            nc2 = nc.getContext("2d");
          nc2.clearRect(0, 0, 44, 44);
          const iconCol = zone ? zone.color : dk ? "#f0efe8" : "#0a0a0a";
          drawIcon(nc2, zone ? zone.name : "", 22, 22, 36, iconCol);
          document.getElementById("tHr").textContent =
            String(h).padStart(2, "0") + ":00";
          document.getElementById("tTsk").textContent = zone
            ? zone.name
            : "Tự do";
          // accent bar màu zone
          const acc = document.getElementById("tAccent");
          acc.style.background = zone
            ? zone.color
            : dk
              ? "rgba(240,239,232,.3)"
              : "rgba(0,0,0,.15)";
          const t = document.getElementById("toast");
          t.classList.add("show");
          const f = document.getElementById("tFill");
          f.classList.remove("drain");
          f.style.transition = "none";
          f.style.transform = "scaleX(1)";
          void f.offsetWidth;
          f.classList.add("drain");
          if (nTimer) clearTimeout(nTimer);
          nTimer = setTimeout(hideToast, 5000);
        }
        function hideToast() {
          document.getElementById("toast").classList.remove("show");
          if (nTimer) {
            clearTimeout(nTimer);
            nTimer = null;
          }
        }

        /* settings panel */
        let panelOpen = false;
        document.getElementById("settBtn").addEventListener("click", () => {
          panelOpen = !panelOpen;
          document.getElementById("panel").classList.toggle("open", panelOpen);
          document.getElementById("settBtn").querySelector("i").className =
            panelOpen ? "ti ti-x" : "ti ti-settings";
        });

        function setTheme(t) {
          dk = t === "dark";
          document.body.classList.toggle("dk", dk);
          document.getElementById("tL").classList.toggle("on", !dk);
          document.getElementById("tD").classList.toggle("on", dk);
        }

        function buildPanel() {
          const list = document.getElementById("zlist");
          list.innerHTML = "";
          const opts = Array.from(
            { length: 25 },
            (_, i) =>
              `<option value="${i}">${String(i).padStart(2, "0")}:00</option>`,
          ).join("");
          zones.forEach((z) => {
            const d = document.createElement("div");
            d.className = "zi";
            d.innerHTML = `
      <div class="zh">
        <div class="zdot" style="background:${z.color}"></div>
        <span class="zn">${z.name}</span>
        <span class="zr">${String(z.from).padStart(2, "0")}–${String(z.to).padStart(2, "0")}h</span>
        <button class="zdel" data-id="${z.id}" title="Xoá" aria-label="Xoá"><i class="ti ti-trash"></i></button>
      </div>
      <div class="zfields">
        <input type="text" value="${z.name}" data-id="${z.id}" placeholder="Tên hoạt động"/>
        <div class="trow">
          <select class="sf" data-id="${z.id}" data-f="from">${opts}</select>
          <span>→</span>
          <select class="sf" data-id="${z.id}" data-f="to">${opts}</select>
        </div>
      </div>`;
            d.querySelectorAll(".sf").forEach((s) => {
              s.value = z[s.dataset.f];
              s.addEventListener("change", (e) => {
                const zz = zones.find((x) => x.id == e.target.dataset.id);
                if (zz) zz[e.target.dataset.f] = +e.target.value;
                buildPanel();
              });
            });
            d.querySelector("input").addEventListener("input", (e) => {
              const zz = zones.find((x) => x.id == e.target.dataset.id);
              if (zz) {
                zz.name = e.target.value;
                d.querySelector(".zn").textContent = e.target.value || "—";
              }
            });
            d.querySelector(".zdel").addEventListener("click", (e) => {
              e.stopPropagation();
              const id = +e.currentTarget.dataset.id;
              d.style.transform = "translateX(8px)";
              d.style.opacity = "0";
              d.style.transition = "all .25s";
              setTimeout(() => {
                zones = zones.filter((x) => x.id !== id);
                buildPanel();
              }, 220);
            });
            list.appendChild(d);
          });
        }
        document.getElementById("addBtn").addEventListener("click", () => {
          zones.push({
            id: nid++,
            name: "hoạt động mới",
            from: 0,
            to: 2,
            color: ZCOLS[nid % ZCOLS.length],
          });
          buildPanel();
          setTimeout(() => {
            const l = document.getElementById("zlist");
            l.lastChild?.scrollIntoView({ behavior: "smooth" });
          }, 50);
        });

        buildPanel();
        loop();
      }); // end DOMContentLoaded
    </script>
  </body>
</html>
