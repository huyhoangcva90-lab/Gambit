<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#11100f">
  <meta name="description" content="Mystic Oracle V2 - Tarot, chiem tinh, Kinh Dich, Bat Tu va cac he thong bieu tuong.">
  <title>Mystic Oracle V2</title>
  <link rel="stylesheet" href="oracle-v2/vendor/tabler-icons.min.css">
  <link rel="stylesheet" href="oracle-v2/oracle.css">
</head>
<body>
  <canvas id="sky" aria-hidden="true"></canvas>

  <div class="app-shell">
    <aside class="sidebar">
      <a class="brand" href="../index.html" aria-label="Quay lại Hub">
        <span class="brand-mark">MO</span>
        <span><strong>Mystic Oracle</strong><small>Personal divination studio</small></span>
      </a>

      <nav class="primary-nav" aria-label="Điều hướng chính">
        <button class="nav-item active" data-view="home"><i class="ti ti-layout-dashboard"></i><span>Tổng quan</span></button>
        <button class="nav-item" data-view="daily"><i class="ti ti-sparkles"></i><span>Thông điệp ngày</span></button>
        <button class="nav-item" data-view="history"><i class="ti ti-history"></i><span>Lịch sử</span></button>
        <button class="nav-item" data-view="saved"><i class="ti ti-bookmark"></i><span>Đã lưu</span></button>
      </nav>

      <div class="sidebar-section">
        <span>Khám phá</span>
        <div id="sideModules" class="side-modules"></div>
      </div>

      <button class="profile-card" id="openProfile">
        <span class="avatar" id="profileAvatar">?</span>
        <span><strong id="profileName">Tạo hồ sơ</strong><small id="profileMeta">Ngày, giờ và nơi sinh</small></span>
        <i class="ti ti-chevron-right"></i>
      </button>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <p class="eyebrow" id="viewEyebrow">MYSTIC ORACLE V2</p>
          <h1 id="viewTitle">Bản đồ trực giác của bạn</h1>
        </div>
        <div class="top-actions">
          <button class="icon-btn" id="searchToggle" aria-label="Tìm kiếm"><i class="ti ti-search"></i></button>
          <button class="icon-btn" id="themeToggle" aria-label="Đổi giao diện"><i class="ti ti-moon"></i></button>
          <button class="profile-mini" id="openProfileTop" aria-label="Mở hồ sơ"><span id="profileAvatarTop">?</span></button>
        </div>
      </header>

      <div class="search-panel" id="searchPanel">
        <i class="ti ti-search"></i>
        <input id="globalSearch" type="search" placeholder="Tìm Tarot, Bát Tự, giấc mơ...">
        <kbd>ESC</kbd>
      </div>

      <section id="content" class="content" aria-live="polite"></section>
    </main>
  </div>

  <nav class="mobile-nav" aria-label="Điều hướng mobile">
    <button class="mobile-nav-item active" data-view="home"><i class="ti ti-layout-dashboard"></i><span>Trang chủ</span></button>
    <button class="mobile-nav-item" data-view="daily"><i class="ti ti-sparkles"></i><span>Hôm nay</span></button>
    <button class="mobile-nav-item" data-view="history"><i class="ti ti-history"></i><span>Lịch sử</span></button>
    <button class="mobile-nav-item" id="openProfileMobile"><i class="ti ti-user-circle"></i><span>Hồ sơ</span></button>
  </nav>

  <div class="drawer-backdrop" id="drawerBackdrop"></div>
  <aside class="profile-drawer" id="profileDrawer" aria-labelledby="profileDrawerTitle">
    <div class="drawer-head">
      <div><p class="eyebrow">HỒ SƠ DÙNG CHUNG</p><h2 id="profileDrawerTitle">Dữ liệu khai sinh</h2></div>
      <button class="icon-btn" id="closeProfile" aria-label="Đóng"><i class="ti ti-x"></i></button>
    </div>
    <form id="profileForm">
      <label>Họ tên<input id="pfName" type="text" placeholder="Tên bạn"></label>
      <div class="form-grid">
        <label>Ngày sinh<input id="pfDate" type="date" required></label>
        <label>Giờ sinh<input id="pfTime" type="time" value="12:00"></label>
      </div>
      <label>Nơi sinh<input id="pfPlace" type="text" placeholder="TP. Hồ Chí Minh"></label>
      <details class="advanced-profile">
        <summary><i class="ti ti-adjustments-horizontal"></i>Tùy chọn nâng cao</summary>
        <div class="form-grid">
          <label>Vĩ độ<input id="pfLat" type="number" step="0.0001" value="10.8231"></label>
          <label>Kinh độ<input id="pfLng" type="number" step="0.0001" value="106.6297"></label>
        </div>
        <label>Múi giờ
          <select id="pfTimezone">
            <option value="7">UTC+7 · Việt Nam</option>
            <option value="8">UTC+8</option>
            <option value="9">UTC+9</option>
            <option value="0">UTC</option>
            <option value="-5">UTC-5</option>
            <option value="-8">UTC-8</option>
          </select>
        </label>
      </details>
      <button class="primary-btn" type="submit"><i class="ti ti-device-floppy"></i>Lưu hồ sơ</button>
      <button class="secondary-btn" type="button" id="clearProfile"><i class="ti ti-trash"></i>Xóa dữ liệu hồ sơ</button>
      <p class="privacy-note"><i class="ti ti-lock"></i>Dữ liệu chỉ được lưu trên trình duyệt này.</p>
    </form>
  </aside>

  <div class="toast-region" id="toastRegion" aria-live="polite"></div>

  <script src="oracle-v2/vendor/lunar.js"></script>
  <script src="oracle-v2/vendor/suncalc.js"></script>
  <script src="oracle-v2/vendor/astronomy.browser.min.js"></script>
  <script src="oracle-v2/oracle.js"></script>
  <script src="../app-guard.js"></script>
</body>
</html>
